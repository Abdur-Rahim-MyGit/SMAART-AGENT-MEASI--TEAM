version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: smaart_db
      POSTGRES_USER: smaart
      POSTGRES_PASSWORD: smaart_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ml-service:
    build: ./ml-service
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://smaart:smaart_secret@postgres:5432/smaart_db
      - MONGO_URI=${MONGO_URI}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ML_SERVICE_URL=http://ml-service:5001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - ml-service

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
